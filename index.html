<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            <a>ლოკაცია</a>
            <a>ქვეყანა</a>
            <a>ქალაქი</a>
        </nav>
        <h1 class="logo">GeoData</h1>
        <nav>
            <a>ამინდი</a>
            <a>ინფორმაცია</a>
            <a>სხვა</a>
        </nav>
    </header>

    <main>
        <div class="input_container">
            <div>
                <h1>შეიყვანეთ ადგილი</h1>
                <input type="text">
            </div>
            <div class="line"></div>
            <div>
                <h1>თქვენი ლოკაცია</h1>
                <button id="location_access">ნებართვა</button>
            </div>
        </div>
        <div class="location">
            <div class="text">
                <h1>ლოკაცია</h1>
                <h2>Name name</h2>
                <p>41.6525, 44.9053</p>
                <p>ფოსტის კოდი: 0000</p>
            </div>
            <iframe
                src="https://maps.google.com/maps?q=0.0,0.0&z=15&output=embed"
                width="400" height="400"
                style="border:0"
                allowfullscreen
                id="map">
            </iframe>
        </div>
    </main>

    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
