<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">
    <title>GeoData</title>
</head>
<body>
    <header>
        <nav>
            <a>ლოკაცია</a>
            <a>ქვეყანა</a>
            <a>ქალაქი</a>
        </nav>
        <h1 class="logo">GeoData</h1>
        <nav>
            <a>ამინდი</a>
            <a>ინფორმაცია</a>
            <a>სხვა</a>
        </nav>
    </header>

    <main>
        <div class="input_container">
            <div>
                <h1>შეიყვანეთ ადგილი</h1>
                <input type="text">
            </div>
            <div class="line"></div>
            <div>
                <h1>თქვენი ლოკაცია</h1>
                <button id="location_access">ნებართვა</button>
            </div>
        </div>

        <div class="location">
            <div class="text">
                <h1>ლოკაცია</h1>
                <h2 id="street_name"></h2>
                <p id="district_name"></p>
                <p id="city_name"></p>
                <p id="country_name"></p>
                <p id="coordinates"></p>
                <p id="postal_code"></p>
            </div>
            <iframe
                src="https://maps.google.com/maps?q=0.0,0.0&z=15&output=embed"
                width="400" height="400"
                style="border:0"
                allowfullscreen
                id="map">
            </iframe>
        </div>

        <div class="country">
            <div class="text">
                <h1>ქვეყანა</h1>
                <h2 id="country_name"></h2>
                <p id="population"></p>
                <p id="area"></p>
                <p id="capital"></p>
                <p id="country_code"></p>
                <p id="calling_code"></p>
                <p id="timezone"></p>
            </div>
            <img>
        </div>

        <div class="city">
            <div class="text">
                <h1>ქალაქი</h1>
                <h2 id="city_name"></h2>
                <p id="city_type"></p>
                <p id="population"></p>
                <p id="description"></p>
            </div>
            <img>
        </div>

        <div class="weather">
            <div class="text">
                <h1>ამინდი</h1>
                <h2 id="temperature"></h2>
                <p id="weather"></p>
                <p id="time"></p>
                <p id="windspeed"></p>
            </div>
            <p id="icon"></p>
        </div>
    </main>

    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
